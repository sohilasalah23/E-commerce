<div class="container">
    <div class=" w-75 m-auto">
        <label for="search" class="my-2">search :</label>
        <input [(ngModel)]="searchterm" type="text"  name="search" id="search" class="form-control mb-2">
    </div>
    
    <div class="row">
        <div class="col-xl-2 col-lg-3 col-md-4 col-sm-6"*ngFor="let product of allproduct | searchproduct : searchterm">
            <app-product-item [product]="product"></app-product-item>
        </div>
    </div>
</div>
