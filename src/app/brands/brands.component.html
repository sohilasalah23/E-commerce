<div class="container">
    <div class="row"  >
        <div class="col-md-2" *ngFor="let product of products">
            <div class="product px-2 py-4">
                <a [routerLink]="['/brandsdetials', product._id]" >
                <img [src]="product.image" class="w-100"  alt="">
                <p class="text-main">{{product.name}}</p>
                <div class="d-flex justify-content-between mb-1">
                
                </div>
            </a>
            
            </div>

        </div>
    </div>
</div>
